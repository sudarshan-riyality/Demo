<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Web Page</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
    }

    /* Navbar style */
    nav {
      background-color: #16fad4;
      padding: 15px;
    }

    nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
    }

    nav ul li {
      color: white;
      margin: 0 20px;
      cursor: pointer;
    }

    nav ul li:hover {
      color: yellow;
    }

    /* Main content */
    .content {
      padding: 30px;
      text-align: center;
    }

    /* Footer */
    footer {
      background-color: #16fad4;
      color: white;
      text-align: center;
      padding: 10px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
  </style>

</head>
<body>

  <!-- Navigation Bar -->
  <nav>
    <ul>
      <li><a href="Home.html">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Services</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <!-- Main Section -->
  <div class="content">
    <h1>Welcome to My Website</h1>
    <p>This is a simple webpage using HTML and CSS.</p>
  </div>

  <!-- Footer -->
  <footer>
    © 2026 My Website | All Rights Reserved
  </footer>

</body>
</html>
